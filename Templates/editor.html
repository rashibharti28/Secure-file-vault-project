<!DOCTYPE html>
<html>
<head>
    <title>Editor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Quill -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }

        .editor-box {
            background: white;
            border-radius: 10px;
            padding: 10px;
        }
    </style>
</head>

<body class="bg-light">

<!--  NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🔐 Secure Vault</span>
    <a href="/dashboard" class="btn btn-secondary btn-sm">⬅ Dashboard</a>
</nav>

<div class="container mt-4">

    <div class="card shadow">
        <div class="card-body">

            <h4 class="mb-3">✏️ Editing: {{ filename }}</h4>

            <form method="POST">

                <!--  Quill Editor -->
                <div id="editor" class="editor-box" style="height: 350px;"></div>

                <!-- Hidden content -->
                <input type="hidden" name="content" id="hiddenContent">

                <!-- Existing content -->
                <input type="hidden" id="existingContent" value='{{ content | safe }}'>

                <!-- ACTION BUTTONS -->
                <div class="d-flex justify-content-between mt-3">

                    <div>
                        <button type="submit" class="btn btn-success">
                            💾 Save Changes
                        </button>
                    </div>

                    <div>
                        <a href="/dashboard" class="btn btn-outline-secondary">
                            Cancel
                        </a>
                    </div>

                </div>

            </form>

        </div>
    </div>

</div>

<!-- Quill -->
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>
    var quill = new Quill('#editor', {
        theme: 'snow',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, false] }],
                ['bold', 'italic', 'underline'],
                ['link'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['clean']
            ]
        }
    });

    //  Load existing content
    const existing = document.getElementById("existingContent").value;
    if (existing && existing !== "None") {
        quill.root.innerHTML = existing;
    }

    //  Save content
    document.querySelector('form').onsubmit = function() {
        document.getElementById('hiddenContent').value = quill.root.innerHTML;
    };
</script>

</body>
</html>
