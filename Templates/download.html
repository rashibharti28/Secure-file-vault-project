<!DOCTYPE html>
<html>
<head>
    <title>Authenticate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    
    <div class="card shadow col-md-5 mx-auto">
        <div class="card-body text-center">

            <h4 class="mb-3">🔐 Secure Access</h4>
            <p>Enter password to open <b>{{ filename }}</b></p>

            <form method="POST">
                <input type="password" 
                       name="password" 
                       class="form-control mb-3"
                       placeholder="Enter your password"
                       required>

                <button type="submit" class="btn btn-primary w-100">
                    🔓 Open File
                </button>
            </form>

            {% if error %}
                <p class="text-danger mt-3">{{ error }}</p>
            {% endif %}

            {% if preview %}
                <div class="mt-3">
                    <small class="text-muted">🔐 Encrypted Preview:</small>
                    <pre class="bg-white border p-2">{{ preview }}</pre>
                </div>
            {% endif %}

            <a href="/dashboard" class="btn btn-secondary mt-3 w-100">
                ⬅ Back to Dashboard
            </a>

        </div>
    </div>

</div>

</body>
</html>
