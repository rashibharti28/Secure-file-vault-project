<!DOCTYPE html>
<html>
<head>
    <title>View File</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        pre {
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="card shadow">
        <div class="card-body">

            <h4>📄 {{ filename }}</h4>

            <!--  WRONG PASSWORD -->
            {% if result and result.error %}
                <p class="text-danger fw-bold">{{ result.error }}</p>

                <small class="text-muted">🔐 Encrypted Preview:</small>
                <pre class="bg-light p-2 border rounded">{{ result.preview }}</pre>
            {% endif %}

            <!--  TEXT FILE -->
            {% if filetype == "text" %}
              <div class="bg-white p-3 border">
                   {{ content | safe }}
              </div>
            {% endif %}

            <!--  IMAGE FILE -->
            {% if filetype == "image" %}
                <img src="data:image/{{ ext }};base64,{{ image_data | b64encode }}"
                     class="img-fluid rounded border">
            {% endif %}

            <!--  SHOW DOWNLOAD ONLY IF SUCCESS -->
            {% if not result or not result.error %}
            <div class="mt-3">
                <a href="{{ url_for('download_file_direct', filename=filename | urlencode) }}"
                   class="btn btn-success">
                    ⬇ Download
                </a>
            {% endif %}

                <a href="/dashboard" class="btn btn-secondary">⬅ Back</a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
