<!DOCTYPE html>
<html>
<head>
    <title>Authentication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow col-md-6 mx-auto">
        <div class="card-body text-center">

            <h4>🔐 Authentication Required</h4>
            <p>Edit file: <b>{{ filename }}</b></p>

            <form method="POST">
                <input type="password" name="auth_password" class="form-control" placeholder="Enter password" required>
                <button class="btn btn-primary mt-3">Verify</button>
            </form>

            {% if error %}
                <p class="text-danger mt-2">{{ error }}</p>
            {% endif %}

            {% if preview %}
                <div class="mt-3">
                    <small>🔐 Encrypted Preview:</small>
                    <pre>{{ preview }}</pre>
                </div>
            {% endif %}

            <a href="/dashboard" class="btn btn-secondary mt-3">Back</a>

        </div>
    </div>
</div>

</body>
</html>
