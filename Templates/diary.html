<!DOCTYPE html>
<html>
<head>
    <title>Diary</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Quill -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }

        .editor-box {
            background: white;
            border-radius: 10px;
            padding: 10px;
        }

        .mood-btn button {
            margin-right: 8px;
        }
    </style>
</head>

<body>

<div class="container mt-4">

    <div class="card shadow">
        <div class="card-body">

            <h3>📔 Write Diary Entry</h3>

            <p class="text-muted">📅 {{ date if date else "Today" }}</p>

            <form method="POST">

                <!-- Editor -->
                <div id="editor" class="editor-box" style="height: 300px;"></div>

                <!-- Hidden content -->
                <input type="hidden" name="content" id="hiddenContent">

                <!-- Existing content -->
                <input type="hidden" id="existingContent" value='{{ content | safe }}'>

                <br>

                <!-- Mood -->
                <label class="mb-2">Mood:</label>
                <div class="mood-btn">
                    <button type="button" class="btn btn-outline-success" onclick="setMood('happy')">😊 Happy</button>
                    <button type="button" class="btn btn-outline-primary" onclick="setMood('calm')">😌 Calm</button>
                    <button type="button" class="btn btn-outline-warning" onclick="setMood('sad')">😢 Sad</button>
                    <button type="button" class="btn btn-outline-danger" onclick="setMood('angry')">😡 Angry</button>
                </div>

                <input type="hidden" name="mood" id="moodInput" value="happy">

                <br>

                <button type="submit" class="btn btn-success">💾 Save Entry</button>

            </form>

            <br>
            <a href="/dashboard" class="btn btn-secondary">⬅ Back</a>

        </div>
    </div>

</div>

<!-- Quill -->
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<script>

    var quill = new Quill('#editor', {
        theme: 'snow',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, false] }],
                ['bold', 'italic', 'underline'],
                ['link'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['clean']
            ]
        }
    });

    // Load existing content
    const existing = document.getElementById("existingContent").value;
    if (existing && existing !== "None") {
        quill.root.innerHTML = existing;
    }

    // Save content
    document.querySelector('form').onsubmit = function() {
        document.querySelector('#hiddenContent').value = quill.root.innerHTML;
    };

    // Mood selection
    function setMood(mood) {
        document.getElementById("moodInput").value = mood;
    }

</script>

</body>
</html>
