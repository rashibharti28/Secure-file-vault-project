<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow col-md-5 mx-auto">
        <div class="card-body text-center">

            <h3 class="mb-3">🔐 Login</h3>
            <p class="text-muted">Access your Secure Vault</p>

            <form method="POST">

                <input type="text"
                       name="username"
                       class="form-control mb-3"
                       placeholder="Enter Username"
                       required>

                <input type="password"
                       name="password"
                       class="form-control mb-3"
                       placeholder="Enter Password"
                       required>

                <button type="submit" class="btn btn-primary w-100">
                    Login
                </button>

            </form>

            <div class="mt-3">
                <small>Don't have an account?</small><br>
                <a href="/register" class="btn btn-outline-secondary btn-sm mt-2">
                    Register
                </a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
